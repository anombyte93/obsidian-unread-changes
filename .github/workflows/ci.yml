name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install, test, build
        run: |
          npm ci
          npm test
          npm run build

      - name: vault_write.py self-test
        run: python3 scripts/vault_write.py --self-test
